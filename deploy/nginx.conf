# =============================================================================
#  悠选商城 Nginx 配置 - 部署到 nengzhan.xyz
#  位置：/etc/nginx/sites-available/mall.conf
#  启用：sudo ln -sf /etc/nginx/sites-available/mall.conf /etc/nginx/sites-enabled/mall.conf
#       sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name xxl.nengzhan.xyz nengzhan.xyz www.nengzhan.xyz;

    root /var/www/mall;
    index index.html;

    # SPA 兜底：将来切 BrowserRouter 也兼容
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 带 hash 的静态资源，长缓存 + immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 入口 HTML 不缓存，每次更新立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript
               application/javascript application/json
               image/svg+xml font/woff2;

    server_tokens off;
}
